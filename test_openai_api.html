<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenAI 兼容 API 测试工具 (Files API)</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #f5f5f5;
            color: #333;
        }
        .container {
            max-width: 1100px;
            margin: 0 auto;
            background: #fff;
            padding: 20px 30px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        h1 {
            color: #2c3e50;
            border-bottom: 2px solid #eee;
            padding-bottom: 10px;
        }
        .section {
            margin-bottom: 25px;
            padding: 15px;
            border: 1px solid #e1e4e8;
            border-radius: 6px;
            background-color: #fafbfc;
        }
        .section h2 {
            margin-top: 0;
            font-size: 1.1em;
            color: #0366d6;
        }
        .form-group {
            margin-bottom: 12px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            font-size: 0.9em;
        }
        input[type="text"], input[type="password"], input[type="number"] {
            width: 100%;
            padding: 8px 12px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
            font-family: monospace;
        }
        input[type="file"] {
            padding: 6px 0;
        }
        button {
            background-color: #2ea44f;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
        }
        button:hover { background-color: #2c974b; }
        .btn-danger { background-color: #d73a49; }
        .btn-danger:hover { background-color: #cb2431; }
        .btn-secondary { background-color: #6a737d; }
        .btn-secondary:hover { background-color: #586069; }
        .flex-row {
            display: flex;
            gap: 10px;
            align-items: center;
        }
        .flex-row input { flex: 1; }
        .config-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 10px;
        }
        #response-container { margin-top: 20px; }
        .status-badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: bold;
            margin-bottom: 10px;
        }
        .status-success { background-color: #d4edda; color: #155724; }
        .status-error { background-color: #f8d7da; color: #721c24; }
        .status-warning { background-color: #fff3cd; color: #856404; }
        pre {
            background-color: #282c34;
            color: #abb2bf;
            padding: 15px;
            border-radius: 6px;
            overflow-x: auto;
            white-space: pre-wrap;
            word-wrap: break-word;
            font-size: 14px;
            margin: 0;
        }
        #fileList {
            max-height: 300px;
            overflow-y: auto;
            border: 1px solid #e1e4e8;
            border-radius: 4px;
        }
        .file-item {
            display: flex;
            align-items: center;
            padding: 8px 12px;
            border-bottom: 1px solid #eee;
            gap: 10px;
            cursor: pointer;
        }
        .file-item:hover { background-color: #f0f0f0; }
        .file-item:last-child { border-bottom: none; }
        .file-icon {
            width: 32px;
            height: 32px;
            border-radius: 4px;
            background-color: #e1e4e8;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: bold;
            color: #586069;
            flex-shrink: 0;
        }
        .file-meta { flex: 1; min-width: 0; }
        .file-name {
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .file-size { font-size: 12px; color: #666; }
        .media-preview {
            margin-top: 15px;
            padding: 15px;
            border: 1px solid #e1e4e8;
            border-radius: 6px;
            background-color: #fff;
            text-align: center;
        }
        .media-preview img, .media-preview video {
            max-width: 100%;
            max-height: 500px;
            border-radius: 4px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
        }
        .media-preview audio {
            width: 100%;
            margin-top: 10px;
        }
        .upload-progress {
            margin-top: 10px;
            display: none;
        }
        .progress-bar-bg {
            height: 20px;
            background-color: #e9ecef;
            border-radius: 4px;
            overflow: hidden;
        }
        .progress-bar-fill {
            height: 100%;
            background-color: #2ea44f;
            width: 0%;
            transition: width 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 12px;
            font-weight: bold;
        }
        .chunk-status {
            font-size: 12px;
            color: #666;
            margin-top: 5px;
        }
        .checkbox-row {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .checkbox-row input[type="checkbox"] {
            width: auto;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>OpenAI 兼容 API 测试工具 (Files API)</h1>
    <p>用于测试后端实现的 <code>/v1/files</code> 接口及 API_KEY 鉴权、IP 黑名单等机制。</p>

    <!-- Global Config -->
    <div class="section">
        <h2>全局配置</h2>
        <div class="config-grid">
            <div class="form-group">
                <label for="baseUrl">Base URL</label>
                <input type="text" id="baseUrl" value="http://localhost:8080/v1">
            </div>
            <div class="form-group">
                <label for="apiKey">API Key</label>
                <input type="password" id="apiKey" value="" autocomplete="off" placeholder="Bearer Token">
            </div>
            <div class="form-group">
                <label for="chunkSize">分片大小 (MB)</label>
                <input type="number" id="chunkSize" value="10" min="1" max="100">
            </div>
        </div>
        <div class="checkbox-row">
            <input type="checkbox" id="forceChunk" checked>
            <label for="forceChunk" style="margin:0; font-weight:normal;">强制分片上传（所有文件都分片）</label>
        </div>
    </div>

    <!-- APIs -->
    <div class="section">
        <h2>1. 获取文件列表 (GET /v1/files)</h2>
        <button onclick="listFiles()">刷新列表</button>
        <div id="fileList" style="margin-top:10px;"></div>
    </div>

    <div class="section">
        <h2>2. 上传文件 (POST /v1/files) — 支持分片</h2>
        <div class="form-group">
            <label>选择本地文件:</label>
            <input type="file" id="fileInput">
        </div>
        <div class="form-group">
            <label>或者提供远程 URL (file_url):</label>
            <input type="text" id="fileUrlInput" placeholder="https://example.com/video.mp4">
        </div>
        <button onclick="uploadFile()">开始上传</button>
        <button class="btn-secondary" onclick="cancelUpload()">取消</button>
        <div id="uploadProgress" class="upload-progress">
            <div class="progress-bar-bg">
                <div id="progressFill" class="progress-bar-fill">0%</div>
            </div>
            <div id="chunkStatus" class="chunk-status"></div>
        </div>
    </div>

    <div class="section">
        <h2>3. 文件详情 / 在线预览</h2>
        <div class="flex-row">
            <input type="text" id="fileIdInfo" placeholder="File ID，如: images_data/photo.jpg">
            <button onclick="previewFile()">预览</button>
            <button class="btn-secondary" onclick="getFileInfo()">仅获取信息</button>
        </div>
        <div id="mediaPreview" class="media-preview" style="display:none;"></div>
    </div>

    <div class="section">
        <h2>4. 删除文件 (DELETE /v1/files/:file_id)</h2>
        <div class="flex-row">
            <input type="text" id="fileIdDelete" placeholder="File ID">
            <button class="btn-danger" onclick="deleteFile()">删除</button>
        </div>
    </div>

    <div class="section">
        <h2>5. 获取下载链接 (GET /v1/files/:file_id/content)</h2>
        <div class="flex-row">
            <input type="text" id="fileIdContent" placeholder="File ID">
            <button onclick="getFileContent()">获取链接</button>
        </div>
    </div>

    <!-- Output -->
    <div id="response-container" class="section">
        <h2>原始响应 (JSON)</h2>
        <div id="statusBadge" style="display:none;"></div>
        <pre id="responseOutput">等待操作...</pre>
    </div>
</div>

<script>
    const storageKeys = { baseUrl: "openai_api_tester_base_url", apiKey: "openai_api_tester_api_key" };
    let uploadCancelled = false;

    (function initFormState() {
        const baseUrlInput = document.getElementById("baseUrl");
        const apiKeyInput = document.getElementById("apiKey");
        const savedBaseUrl = localStorage.getItem(storageKeys.baseUrl);
        if (savedBaseUrl) baseUrlInput.value = savedBaseUrl;
        const savedApiKey = localStorage.getItem(storageKeys.apiKey);
        if (savedApiKey) apiKeyInput.value = savedApiKey;
        baseUrlInput.addEventListener("input", () => localStorage.setItem(storageKeys.baseUrl, baseUrlInput.value));
        apiKeyInput.addEventListener("input", () => localStorage.setItem(storageKeys.apiKey, apiKeyInput.value));
    })();

    function getHeaders() {
        return { 'Authorization': `Bearer ${document.getElementById('apiKey').value}` };
    }
    function getBaseUrl() {
        return document.getElementById('baseUrl').value.replace(/\/$/, "");
    }

    function displayResponse(status, data) {
        const output = document.getElementById('responseOutput');
        const badge = document.getElementById('statusBadge');
        badge.style.display = 'inline-block';
        badge.innerText = `HTTP ${status}`;
        badge.className = `status-badge ${status >= 200 && status < 300 ? 'status-success' : 'status-error'}`;
        output.innerText = typeof data === 'object' ? JSON.stringify(data, null, 2) : data;
    }

    function handleError(error) {
        const badge = document.getElementById('statusBadge');
        badge.style.display = 'inline-block';
        badge.innerText = 'Network Error';
        badge.className = 'status-badge status-error';
        document.getElementById('responseOutput').innerText = error.toString();
    }

    function formatBytes(bytes) {
        if (bytes === 0) return '0 B';
        const k = 1024;
        const sizes = ['B', 'KB', 'MB', 'GB'];
        const i = Math.floor(Math.log(bytes) / Math.log(k));
        return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
    }

    function getMediaIcon(name) {
        const ext = name.split('.').pop().toLowerCase();
        const iconMap = {
            jpg: 'IMG', jpeg: 'IMG', png: 'IMG', gif: 'IMG', webp: 'IMG', svg: 'IMG',
            mp4: 'VID', webm: 'VID', mov: 'VID', mkv: 'VID', avi: 'VID',
            mp3: 'AUD', wav: 'AUD', flac: 'AUD', aac: 'AUD', m4a: 'AUD',
            pdf: 'PDF', zip: 'ZIP', rar: 'RAR', tar: 'TAR',
        };
        return iconMap[ext] || 'FILE';
    }

    async function listFiles() {
        try {
            document.getElementById('responseOutput').innerText = "加载中...";
            document.getElementById('fileList').innerHTML = '';
            const res = await fetch(`${getBaseUrl()}/files`, { method: 'GET', headers: getHeaders() });
            const data = await res.json();
            displayResponse(res.status, data);

            const listEl = document.getElementById('fileList');
            if (data.data && data.data.length > 0) {
                data.data.forEach(file => {
                    const item = document.createElement('div');
                    item.className = 'file-item';
                    item.onclick = () => {
                        document.getElementById('fileIdInfo').value = file.id;
                        document.getElementById('fileIdDelete').value = file.id;
                        document.getElementById('fileIdContent').value = file.id;
                        previewFile();
                    };
                    item.innerHTML = `
                        <div class="file-icon">${getMediaIcon(file.filename || file.id)}</div>
                        <div class="file-meta">
                            <div class="file-name" title="${file.filename || file.id}">${file.filename || file.id}</div>
                            <div class="file-size">${formatBytes(file.bytes || 0)}</div>
                        </div>
                    `;
                    listEl.appendChild(item);
                });
            } else {
                listEl.innerHTML = '<div style="padding:20px;text-align:center;color:#999;">暂无文件</div>';
            }
        } catch (e) { handleError(e); }
    }

    async function uploadFile() {
        const fileInput = document.getElementById('fileInput');
        const fileUrlInput = document.getElementById('fileUrlInput');
        uploadCancelled = false;

        if (fileInput.files.length === 0 && !fileUrlInput.value) {
            alert('请选择文件或输入文件 URL');
            return;
        }

        const chunkSizeMB = parseInt(document.getElementById('chunkSize').value) || 10;
        const forceChunk = document.getElementById('forceChunk').checked;
        const progressEl = document.getElementById('uploadProgress');
        const progressFill = document.getElementById('progressFill');
        const chunkStatus = document.getElementById('chunkStatus');

        if (fileInput.files.length > 0) {
            const file = fileInput.files[0];
            const fileSize = file.size;
            const useChunk = forceChunk || fileSize > chunkSizeMB * 1024 * 1024;
            const chunkSize = chunkSizeMB * 1024 * 1024;

            if (useChunk && fileSize > chunkSize) {
                await uploadChunked(file, chunkSize, progressEl, progressFill, chunkStatus);
            } else {
                await uploadSingle(file, progressEl, progressFill, chunkStatus);
            }
        } else if (fileUrlInput.value) {
            await uploadViaUrl(fileUrlInput.value, progressEl, progressFill, chunkStatus);
        }
    }

    async function uploadChunked(file, chunkSize, progressEl, progressFill, chunkStatus) {
        progressEl.style.display = 'block';
        progressFill.style.width = '0%';
        progressFill.innerText = '0%';
        chunkStatus.innerText = `准备分片上传: ${file.name} (${formatBytes(file.size)})`;

        const totalChunks = Math.ceil(file.size / chunkSize);
        const objectKey = file.name;
        let completedChunks = 0;
        const CHUNK_CONCURRENCY = 10;
        let uploading = [];

        for (let i = 0; i < totalChunks; i++) {
            if (uploadCancelled) {
                chunkStatus.innerText = '已取消上传';
                return;
            }
            while (uploading.length >= CHUNK_CONCURRENCY) {
                await Promise.race(uploading);
            }

            const start = i * chunkSize;
            const end = Math.min(start + chunkSize, file.size);
            const chunk = file.slice(start, end);
            const chunkNum = i + 1;

            const p = uploadChunk(objectKey, chunk, chunkNum, totalChunks).then(() => {
                completedChunks++;
                const pct = Math.round((completedChunks / totalChunks) * 100);
                progressFill.style.width = pct + '%';
                progressFill.innerText = pct + '%';
                chunkStatus.innerText = `上传中: ${completedChunks}/${totalChunks} 分片 (${formatBytes(end - start)}/片)`;
                uploading = uploading.filter(x => x !== p);
            });
            uploading.push(p);
        }

        await Promise.all(uploading);
        chunkStatus.innerText = '上传完成，等待服务端合并...';

        try {
            const res = await fetch(`${getBaseUrl()}/files`, { method: 'GET', headers: getHeaders() });
            const data = await res.json();
            const uploaded = (data.data || []).find(f => f.id === objectKey);
            if (uploaded) {
                displayResponse(res.status, uploaded);
                document.getElementById('fileIdInfo').value = uploaded.id;
                document.getElementById('fileIdDelete').value = uploaded.id;
                document.getElementById('fileIdContent').value = uploaded.id;
            }
        } catch (e) { handleError(e); }
    }

    async function uploadChunk(objectKey, chunk, chunkNum, totalChunks) {
        const formData = new FormData();
        formData.append('file', chunk, `${objectKey}.part${chunkNum}`);
        formData.append('purpose', 'fine-tune');
        formData.append('chunk_number', chunkNum);
        formData.append('total_chunks', totalChunks);
        formData.append('object_key', objectKey);

        const res = await fetch(`${getBaseUrl()}/files`, {
            method: 'POST',
            headers: getHeaders(),
            body: formData
        });
        if (!res.ok) {
            const err = await res.json().catch(() => ({}));
            throw new Error(err.error || `HTTP ${res.status}`);
        }
        return res.json();
    }

    async function uploadSingle(file, progressEl, progressFill, chunkStatus) {
        progressEl.style.display = 'block';
        progressFill.style.width = '50%';
        progressFill.innerText = '上传中...';
        chunkStatus.innerText = `单文件上传: ${file.name} (${formatBytes(file.size)})`;

        const formData = new FormData();
        formData.append('file', file);
        formData.append('purpose', 'fine-tune');

        const res = await fetch(`${getBaseUrl()}/files`, {
            method: 'POST',
            headers: getHeaders(),
            body: formData
        });
        const data = await res.json();
        progressFill.style.width = '100%';
        progressFill.innerText = '完成!';
        displayResponse(res.status, data);

        if (data.id) {
            document.getElementById('fileIdInfo').value = data.id;
            document.getElementById('fileIdDelete').value = data.id;
            document.getElementById('fileIdContent').value = data.id;
        }
    }

    async function uploadViaUrl(url, progressEl, progressFill, chunkStatus) {
        progressEl.style.display = 'block';
        progressFill.style.width = '30%';
        progressFill.innerText = '请求中...';
        chunkStatus.innerText = `代下载上传: ${url}`;

        const formData = new FormData();
        formData.append('file_url', url);
        formData.append('purpose', 'fine-tune');

        const res = await fetch(`${getBaseUrl()}/files`, {
            method: 'POST',
            headers: getHeaders(),
            body: formData
        });
        const data = await res.json();
        progressFill.style.width = '100%';
        progressFill.innerText = '完成!';
        displayResponse(res.status, data);

        if (data.id) {
            document.getElementById('fileIdInfo').value = data.id;
            document.getElementById('fileIdDelete').value = data.id;
            document.getElementById('fileIdContent').value = data.id;
        }
    }

    function cancelUpload() { uploadCancelled = true; }

    async function previewFile() {
        const fileId = document.getElementById('fileIdInfo').value;
        if (!fileId) return alert('请输入 File ID');

        const previewEl = document.getElementById('mediaPreview');
        previewEl.style.display = 'none';
        previewEl.innerHTML = '';

        const base = getBaseUrl().replace('/v1', '');

        try {
            const res = await fetch(`${base}/view/${encodeURIComponent(fileId)}`, {
                method: 'GET',
                headers: getHeaders()
            });

            if (!res.ok) {
                previewEl.style.display = 'block';
                previewEl.innerHTML = `<div style="color:red;">预览失败: HTTP ${res.status}</div>`;
                return;
            }

            const data = await res.json();
            displayResponse(res.status, data);

            previewEl.style.display = 'block';

            if (data.media_type === 'image' && data.url) {
                previewEl.innerHTML = `<img src="${data.url}" alt="预览图片"><div style="margin-top:8px;font-size:12px;color:#666;">有效期: ${data.expires_in}秒 | <a href="${data.url}" target="_blank" rel="noopener">新窗口打开</a></div>`;
            } else if (data.media_type === 'video' && data.url) {
                previewEl.innerHTML = `<video controls autoplay src="${data.url}"></video><div style="margin-top:8px;font-size:12px;color:#666;">有效期: ${data.expires_in}秒 | <a href="${data.url}" target="_blank" rel="noopener">新窗口打开</a></div>`;
            } else if (data.media_type === 'audio' && data.url) {
                previewEl.innerHTML = `<audio controls src="${data.url}"></audio><div style="margin-top:8px;font-size:12px;color:#666;">有效期: ${data.expires_in}秒 | <a href="${data.url}" target="_blank" rel="noopener">新窗口打开</a></div>`;
            } else if (data.media_type === 'pdf' && data.url) {
                previewEl.innerHTML = `<iframe src="${data.url}" style="width:100%;height:600px;border:none;"></iframe><div style="margin-top:8px;font-size:12px;color:#666;">有效期: ${data.expires_in}秒 | <a href="${data.url}" target="_blank" rel="noopener">新窗口打开</a></div>`;
            } else {
                previewEl.innerHTML = `<div style="padding:20px;"><a href="${data.url}" target="_blank" class="btn-secondary" style="display:inline-block;padding:8px 16px;text-decoration:none;color:white;border-radius:4px;">下载 / 打开文件</a><div style="margin-top:8px;font-size:12px;color:#666;">有效期: ${data.expires_in}秒</div></div>`;
            }
        } catch (e) {
            previewEl.style.display = 'block';
            previewEl.innerHTML = `<div style="color:red;">预览出错: ${e.message}</div>`;
            handleError(e);
        }
    }

    async function getFileInfo() {
        const fileId = document.getElementById('fileIdInfo').value;
        if (!fileId) return alert('请输入 File ID');
        try {
            const res = await fetch(`${getBaseUrl()}/files/${encodeURIComponent(fileId)}`, { method: 'GET', headers: getHeaders() });
            const data = await res.json();
            displayResponse(res.status, data);
            document.getElementById('mediaPreview').style.display = 'none';
        } catch (e) { handleError(e); }
    }

    async function deleteFile() {
        const fileId = document.getElementById('fileIdDelete').value;
        if (!fileId) return alert('请输入 File ID');
        if (!confirm(`确认删除文件: ${fileId}？`)) return;
        try {
            const res = await fetch(`${getBaseUrl()}/files/${encodeURIComponent(fileId)}`, { method: 'DELETE', headers: getHeaders() });
            const data = await res.json();
            displayResponse(res.status, data);
        } catch (e) { handleError(e); }
    }

    async function getFileContent() {
        const fileId = document.getElementById('fileIdContent').value;
        if (!fileId) return alert('请输入 File ID');
        try {
            const res = await fetch(`${getBaseUrl()}/files/${encodeURIComponent(fileId)}/content`, { method: 'GET', headers: getHeaders(), redirect: 'follow' });
            displayResponse(res.status, { message: "已重定向", final_url: res.url || '无法获取最终 URL' });
            if (res.url) window.open(res.url, '_blank');
        } catch (e) { handleError(e); }
    }
</script>

</body>
</html>
